name: bump stable
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Detect latest NixOS/nix release tag
        id: latest
        run: |
          set -euo pipefail
          tag=$(
            gh api repos/NixOS/nix/tags --paginate --jq '.[].name' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -1
          )
          if [[ -z "$tag" ]]; then
            echo "::error::failed to detect latest stable NixOS/nix tag"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect current pinned tag
        id: current
        run: |
          set -euo pipefail
          current=$(grep -oE 'github:NixOS/nix/[0-9.]+' flake.nix | head -1 | sed 's|.*/||')
          if [[ -z "$current" ]]; then
            echo "::error::failed to detect current pinned NixOS/nix tag"
            exit 1
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"

      - name: Bump flake.nix if tag changed
        if: steps.latest.outputs.tag != steps.current.outputs.current
        run: |
          sed -i "s|github:NixOS/nix/${{ steps.current.outputs.current }}|github:NixOS/nix/${{ steps.latest.outputs.tag }}|" flake.nix

      - name: nix flake update
        run: nix flake update

      - name: Commit if anything changed
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet flake.nix flake.lock; then
            echo "no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  'bump-bot'
          git config user.email 'bump-bot@users.noreply.github.com'
          git add flake.nix flake.lock
          if [[ "${{ steps.latest.outputs.tag }}" != "${{ steps.current.outputs.current }}" ]]; then
            msg="bump: nix-upstream ${{ steps.current.outputs.current }} → ${{ steps.latest.outputs.tag }}"
          else
            msg="bump: flake inputs refreshed"
          fi
          git commit -m "$msg"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch build + cachix
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-and-cache.yml --ref main
